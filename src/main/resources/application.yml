spring:
  application:
    name: token-ledger-cloud-api

  # 임시로 해놓은거 OpenAI key 설정 안해서 skip 해놓음
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration

  ai:
    openai:
      chat:
        enabled: false # 채팅 기능 일단 끄기


  # 1. Google OAuth2 설정 
  security:
    oauth2:
      client:
        registration:
          google:
            # 대괄호는 YAML에서 배열로 해석되므로 반드시 따옴표로 감싸세요.
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - profile
              - email
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  # 2. H2 데이터베이스 및 JPA 설정
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true  # 웹 브라우저에서 DB를 볼 수 있게 해줍니다 (localhost:8080/h2-console)
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true   # 실행되는 SQL 쿼리를 터미널에 보여줍니다
  flyway:
    enabled: true
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000 # 24시간 (밀리초 단위)
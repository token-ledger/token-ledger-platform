# Integration tests only: satisfy Spring AI + OAuth2 client auto-configuration (no real calls).
spring:
  ai:
    openai:
      api-key: test-dummy-key-not-used-at-runtime
  flyway:
    enabled: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
            scope:
              - profile
              - email

jwt:
  secret: test-jwt-secret-value-test-jwt-secret-value
  expiration: 86400000
